<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ – บริษัท เอวิน โฮลดิ้ง จำกัด</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans','Roboto','Noto Sans Thai',Arial,sans-serif;
    background: linear-gradient(135deg, #4a148c 0%, #880e4f 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  .login-wrap { width: 100%; max-width: 420px; }
  .logo-area { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin: 0 auto 14px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .logo-area h1 { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .logo-area p  { font-size: 13px; color: rgba(255,255,255,0.7); }
  .card {
    background: #fff; border-radius: 16px;
    padding: 32px 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .card h2 { font-size: 18px; font-weight: 500; color: #202124; margin-bottom: 6px; }
  .card .subtitle { font-size: 13px; color: #5f6368; margin-bottom: 24px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #5f6368; margin-bottom: 7px; }
  .field select {
    width: 100%; padding: 11px 14px; font-size: 14px;
    color: #202124; background: #f8f9fa;
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    outline: none; font-family: inherit; cursor: pointer;
    transition: border-color 0.2s; appearance: auto;
  }
  .field select:focus { border-color: #7b1fa2; background: #fff; box-shadow: 0 0 0 3px rgba(123,31,162,0.1); }
  .field input[type=time] {
    width: 100%; padding: 11px 14px; font-size: 14px;
    color: #202124; background: #f8f9fa;
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .field input[type=time]:focus { border-color: #7b1fa2; background: #fff; }

  /* PIN */
  .pin-display { display: flex; justify-content: center; gap: 12px; margin: 10px 0 16px; }
  .pin-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #ce93d8; background: transparent;
    transition: background 0.15s;
  }
  .pin-dot.filled { background: #7b1fa2; border-color: #7b1fa2; }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
  .pin-btn {
    padding: 16px 8px; font-size: 20px; font-weight: 500;
    background: #f8f9fa; border: 1.5px solid #e0e0e0; border-radius: 10px;
    cursor: pointer; font-family: inherit; color: #202124;
    transition: all 0.15s; text-align: center;
  }
  .pin-btn:hover { background: #f3e5f5; border-color: #7b1fa2; }
  .pin-btn:active { transform: scale(0.95); background: #e1bee7; }
  .pin-btn.del { font-size: 16px; color: #c62828; background: #fff5f5; border-color: #ffcdd2; }
  .pin-btn.del:hover { background: #fce4ec; }
  .pin-status { font-size: 12px; text-align: center; margin-top: 6px; min-height: 18px; color: #5f6368; }
  .pin-status.ok  { color: #2e7d32; }
  .pin-status.err { color: #c62828; }

  /* Rounds */
  .round-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .round-btn {
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 12px 4px; background: #f8f9fa;
    cursor: pointer; text-align: center;
    transition: all 0.18s; font-family: inherit;
  }
  .round-btn:hover { border-color: #7b1fa2; background: #f3e5f5; }
  .round-btn.selected { border-color: #7b1fa2; background: #f3e5f5; box-shadow: 0 0 0 3px rgba(123,31,162,0.12); }
  .round-btn .r-id   { font-size: 16px; font-weight: 600; color: #4a148c; }
  .round-btn .r-time { font-size: 11px; color: #5f6368; margin-top: 2px; }
  .round-btn .r-desc { font-size: 9px; color: #7b1fa2; margin-top: 3px; line-height: 1.3; }

  .time-row { display: flex; gap: 10px; align-items: flex-end; }
  .time-row .field { flex: 1; margin-bottom: 0; }
  .now-btn {
    flex-shrink: 0; padding: 11px 14px; font-size: 12px; font-weight: 500;
    background: #f3e5f5; color: #7b1fa2;
    border: 1.5px solid #ce93d8; border-radius: 8px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .now-btn:hover { background: #e1bee7; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 22px 0; }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7b1fa2, #c2185b);
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: opacity 0.18s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.92; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .err-box {
    display: none; background: #fce4ec; color: #c62828;
    border: 1px solid #f48fb1; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-top: 14px; text-align: center;
  }
  .loading-txt { text-align: center; font-size: 13px; color: #9aa0a6; padding: 8px 0; }
  .footer-note { text-align: center; font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 20px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">⛽</div>
    <h1>บริษัท เอวิน โฮลดิ้ง จำกัด</h1>
    <p>ระบบบันทึกการปฏิบัติงาน</p>
  </div>

  <div class="card">
    <h2>เข้าสู่ระบบ / Check-in</h2>
    <p class="subtitle">เลือกชื่อ กรอก PIN และเลือกรอบการตรวจ</p>

    <!-- ชื่อพนักงาน -->
    <div class="field">
      <label>👤 ชื่อพนักงาน / Employee</label>
      <select id="sel-name" onchange="onNameChange()">
        <option value="">-- กำลังโหลดรายชื่อ... --</option>
      </select>
    </div>

    <!-- PIN -->
    <div class="field">
      <label>🔐 PIN 4 หลัก</label>
      <div class="pin-display">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn" onclick="pinPress('0')" style="grid-column:2">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
      </div>
      <div class="pin-status" id="pin-status"></div>
    </div>

    <!-- รอบการตรวจ -->
    <div class="field">
      <label>🔄 รอบการตรวจสอบ / Inspection Round</label>
      <div class="round-grid">
        <button type="button" class="round-btn" data-round="R1" onclick="selectRound(this)">
          <div class="r-id">R1</div><div class="r-time">07:00</div>
          <div class="r-desc">สวน+ต้นไม้+ปั้มลม</div>
        </button>
        <button type="button" class="round-btn" data-round="R2" onclick="selectRound(this)">
          <div class="r-id">R2</div><div class="r-time">09:00</div>
          <div class="r-desc">สวน+ต้นไม้+ปั้มลม</div>
        </button>
        <button type="button" class="round-btn" data-round="R3" onclick="selectRound(this)">
          <div class="r-id">R3</div><div class="r-time">11:00</div>
          <div class="r-desc">สวน+ต้นไม้+ปั้มลม</div>
        </button>
        <button type="button" class="round-btn" data-round="R4" onclick="selectRound(this)">
          <div class="r-id">R4</div><div class="r-time">13:00</div>
          <div class="r-desc">สวน+ต้นไม้+ปั้มลม</div>
        </button>
        <button type="button" class="round-btn" data-round="R5" onclick="selectRound(this)">
          <div class="r-id">R5</div><div class="r-time">15:00</div>
          <div class="r-desc">ดูแลใหญ่ทั้งหมด</div>
        </button>
      </div>
    </div>

    <!-- เวลาเช็คอิน -->
    <div class="field">
      <label>🕐 เวลาเช็คอิน / Check-in Time</label>
      <div class="time-row">
        <div class="field"><input type="time" id="sel-time" onchange="checkReady()"></div>
        <button class="now-btn" onclick="setNow()">ตอนนี้</button>
      </div>
    </div>

    <hr class="divider">
    <button class="login-btn" id="enter-btn" onclick="proceed()" disabled>
      เข้าสู่แบบฟอร์มการทำงาน →
    </button>
    <div class="err-box" id="err-box"></div>
  </div>

  <p class="footer-note">บริษัท เอวิน โฮลดิ้ง จำกัด &nbsp;·&nbsp; เวลาทำการ 07:00–16:00 น.</p>
</div>

<script>
  // ════════════════════════════════════
  //  วาง Apps Script URL ที่นี่
  // ════════════════════════════════════
  var API_URL = 'https://script.google.com/macros/s/AKfycbwA36ttkWkliURUoaBvxLOL1i55NPVO-NMsOBFdzjPkF9cfzdaMxUPlPNRpv3Vs9W-khg/exec';
  // ════════════════════════════════════

  var pin = '';
  var pinVerified = false;
  var selectedRound = null;
  var staffList = [];

  // ---- โหลดรายชื่อพนักงานจาก Sheet ----
  function loadStaff() {
    fetch(API_URL + '?action=getStaff')
      .then(function(r){ return r.json(); })
      .then(function(data){
        var sel = document.getElementById('sel-name');
        sel.innerHTML = '<option value="">-- เลือกชื่อพนักงาน --</option>';
        staffList = data.staff || [];
        staffList.forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s.name;
          opt.textContent = s.name + ' (' + s.position + ')';
          opt.dataset.form = s.form || 'gardener';
          sel.appendChild(opt);
        });
      })
      .catch(function(){
        // fallback ถ้าโหลดไม่ได้
        var sel = document.getElementById('sel-name');
        sel.innerHTML = '<option value="">-- ไม่สามารถโหลดรายชื่อได้ --</option>';
      });
  }

  function onNameChange() {
    pin = '';
    pinVerified = false;
    updateDots();
    document.getElementById('pin-status').textContent = '';
    document.getElementById('pin-status').className = 'pin-status';
    checkReady();
  }

  // ---- PIN ----
  function pinPress(digit) {
    if (pin.length >= 4) return;
    pin += digit;
    updateDots();
    if (pin.length === 4) checkPin();
    checkReady();
  }

  function pinDel() {
    if (pin.length === 0) return;
    pin = pin.slice(0, -1);
    pinVerified = false;
    updateDots();
    document.getElementById('pin-status').textContent = '';
    document.getElementById('pin-status').className = 'pin-status';
    checkReady();
  }

  function updateDots() {
    for (var i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < pin.length);
    }
  }

  function checkPin() {
    var name = document.getElementById('sel-name').value;
    if (!name || !pin) return;

    var statusEl = document.getElementById('pin-status');
    statusEl.textContent = 'กำลังตรวจสอบ...';
    statusEl.className = 'pin-status';

    fetch(API_URL + '?action=verifyPin&name=' + encodeURIComponent(name) + '&pin=' + encodeURIComponent(pin))
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.ok) {
          pinVerified = true;
          statusEl.textContent = '✅ PIN ถูกต้อง';
          statusEl.className = 'pin-status ok';
        } else {
          pinVerified = false;
          statusEl.textContent = '❌ ' + (data.msg || 'PIN ไม่ถูกต้อง');
          statusEl.className = 'pin-status err';
          setTimeout(function(){
            pin = '';
            updateDots();
            statusEl.textContent = '';
            statusEl.className = 'pin-status';
            checkReady();
          }, 1200);
        }
        checkReady();
      })
      .catch(function(){
        statusEl.textContent = '⚠️ ไม่สามารถตรวจสอบได้';
        statusEl.className = 'pin-status err';
      });
  }

  // ---- รอบ ----
  function selectRound(btn) {
    document.querySelectorAll('.round-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedRound = btn.dataset.round;
    var times = { R1:'07:00', R2:'09:00', R3:'11:00', R4:'13:00', R5:'15:00' };
    document.getElementById('sel-time').value = times[selectedRound] || '';
    checkReady();
  }

  function setNow() {
    var now = new Date();
    document.getElementById('sel-time').value =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    checkReady();
  }

  function checkReady() {
    var name = document.getElementById('sel-name').value;
    var time = document.getElementById('sel-time').value;
    var ok = name && pinVerified && selectedRound && time;
    document.getElementById('enter-btn').disabled = !ok;
  }

  function proceed() {
    var name = document.getElementById('sel-name').value;
    var time = document.getElementById('sel-time').value;
    if (!name || !pinVerified || !selectedRound || !time) {
      var errEl = document.getElementById('err-box');
      errEl.style.display = 'block';
      errEl.textContent = 'กรุณากรอกข้อมูลให้ครบและ PIN ให้ถูกต้อง';
      return;
    }
    var params = '?name='  + encodeURIComponent(name)
               + '&round=' + encodeURIComponent(selectedRound)
               + '&time='  + encodeURIComponent(time)
               + '&loc=สวน/ทางเดิน';
    window.location.href = 'GARDENING_CHECKLIST_Form.html' + params;
  }

  // โหลดรายชื่อตอนเปิดหน้า
  loadStaff();
  setNow();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Gardener Checklist – บริษัท เอวิน โฮลดิ้ง จำกัด</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
:root {
  --forest:#1b4332;--canopy:#2d6a4f;--leaf:#40916c;--fern:#52b788;
  --mist:#95d5b2;--dew:#d8f3dc;--sky:#e9f5f0;--gold:#f4a261;
  --amber:#e76f51;--coral:#ff6b6b;--slate:#2b2d42;--stone:#6c757d;
  --pebble:#adb5bd;--smoke:#e9ecef;
  --shadow-sm:0 2px 8px rgba(27,67,50,0.10);
  --shadow-md:0 4px 20px rgba(27,67,50,0.15);
  --shadow-lg:0 8px 40px rgba(27,67,50,0.20);
  --radius-sm:10px;--radius-md:16px;--radius-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:linear-gradient(160deg,#e8f5e9 0%,#f1f8f4 40%,#e0f2f1 100%);background-attachment:fixed;color:var(--slate);min-height:100vh;font-size:16px;}
/* HEADER */
.app-header{background:linear-gradient(135deg,var(--forest) 0%,var(--canopy) 50%,var(--leaf) 100%);padding:24px 20px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);}
.app-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2352b788' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:0.4;}
.header-inner{position:relative;z-index:1;text-align:center;}
.header-emoji{font-size:42px;line-height:1;margin-bottom:8px;}
.header-title{font-size:22px;font-weight:800;color:white;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,0.3);}
.header-company{font-size:14px;color:var(--mist);font-weight:500;margin-top:4px;}
.header-hours{display:inline-block;margin-top:10px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 16px;font-size:13px;color:rgba(255,255,255,0.9);}
/* INFO BAR */
.info-bar{background:white;border-bottom:3px solid var(--dew);padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;box-shadow:var(--shadow-sm);}
.info-field{display:flex;flex-direction:column;gap:5px;}
.info-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--leaf);}
.info-field select,.info-field input{font-family:'Sarabun',sans-serif;font-size:15px;font-weight:500;border:2px solid var(--dew);border-radius:var(--radius-sm);padding:9px 12px;background:var(--sky);color:var(--slate);outline:none;width:100%;transition:border-color 0.2s;appearance:none;}
.info-field select:focus,.info-field input:focus{border-color:var(--fern);box-shadow:0 0 0 3px rgba(82,183,136,0.15);}
.info-display{font-size:15px;font-weight:600;padding:9px 12px;background:var(--smoke);border-radius:var(--radius-sm);color:var(--slate);border:2px solid var(--smoke);}
/* ROUND SELECTOR */
.rounds-label{padding:14px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--stone);}
.rounds-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 16px 16px;}
.round-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;border-radius:var(--radius-sm);border:2.5px solid var(--dew);background:white;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-sm);position:relative;}
.round-btn:hover{border-color:var(--fern);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.round-btn .r-id{font-size:22px;font-weight:800;color:var(--canopy);line-height:1;}
.round-btn .r-time{font-size:12px;font-weight:600;color:var(--stone);margin-top:3px;}
.round-btn .r-status{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700;}
.round-btn.active{background:linear-gradient(135deg,var(--canopy),var(--leaf));border-color:var(--canopy);box-shadow:0 4px 16px rgba(45,106,79,0.35);transform:translateY(-2px);}
.round-btn.active .r-id,.round-btn.active .r-time{color:white;}
.round-btn.done{border-color:var(--mist);background:var(--dew);}
.round-btn.done .r-status{display:flex;background:var(--fern);color:white;}
/* PANEL */
.round-panel{display:none;padding:0 12px 140px;}
.round-panel.active{display:block;}
.panel-header{background:linear-gradient(135deg,var(--forest),var(--canopy));border-radius:var(--radius-md);margin:12px 0 16px;padding:16px 18px;color:white;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md);}
.panel-header-round{font-size:28px;font-weight:800;}
.panel-header-sub{font-size:13px;opacity:0.85;margin-top:2px;}
.panel-progress-ring{position:relative;width:52px;height:52px;flex-shrink:0;}
.progress-svg{transform:rotate(-90deg);}
.progress-track{fill:none;stroke:rgba(255,255,255,0.2);stroke-width:5;}
.progress-arc{fill:none;stroke:white;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.4s ease;}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;}
/* SECTION */
.section-header{display:flex;align-items:center;gap:10px;margin:20px 0 10px;padding:10px 14px;background:white;border-left:4px solid var(--fern);border-radius:0 var(--radius-sm) var(--radius-sm) 0;box-shadow:var(--shadow-sm);}
.section-header .sec-icon{font-size:20px;}
.section-header .sec-text{font-size:15px;font-weight:700;color:var(--forest);}
.section-header .sec-count{margin-left:auto;font-size:12px;color:var(--stone);background:var(--smoke);padding:2px 8px;border-radius:10px;}
/* CHECKLIST ITEM */
.check-item{background:white;border-radius:var(--radius-sm);border:2px solid var(--smoke);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow-sm);transition:border-color 0.15s;}
.check-item.passed{border-color:var(--fern);background:linear-gradient(135deg,#f0fff4,#e8faf0);}
.check-item.failed{border-color:var(--coral);background:#fff5f5;}
.check-item.na{opacity:0.45;background:var(--smoke);border-color:var(--pebble);}
.check-item-top{display:flex;align-items:flex-start;gap:10px;}
.item-badge{width:30px;height:30px;border-radius:8px;background:var(--canopy);color:white;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.check-item.passed .item-badge{background:var(--fern);}
.check-item.failed .item-badge{background:var(--coral);}
.check-item.na .item-badge{background:var(--pebble);}
.item-texts{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:700;line-height:1.35;color:var(--slate);}
.item-hint{font-size:13px;color:var(--stone);margin-top:3px;line-height:1.4;}
.item-actions{display:flex;gap:8px;margin-top:10px;}
.btn-pass,.btn-fail{flex:1;padding:9px 0;border:2.5px solid;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-pass{color:var(--canopy);border-color:var(--mist);background:var(--dew);}
.btn-fail{color:#c0392b;border-color:#fbb;background:#fff0f0;}
.btn-pass.sel{background:linear-gradient(135deg,var(--fern),var(--canopy));color:white;border-color:var(--canopy);box-shadow:0 3px 12px rgba(64,145,108,0.35);}
.btn-fail.sel{background:linear-gradient(135deg,#ff6b6b,#c0392b);color:white;border-color:#c0392b;box-shadow:0 3px 12px rgba(192,57,43,0.3);}
.btn-na-label{flex:1;text-align:center;padding:9px 0;font-size:13px;color:var(--pebble);}
/* OIL METER */
.oil-meter{background:white;border-radius:var(--radius-sm);border:2px solid var(--smoke);margin-bottom:8px;overflow:hidden;}
.oil-meter-top{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.oil-badge{width:30px;height:30px;border-radius:8px;background:#6d3b47;color:white;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.oil-name{font-size:15px;font-weight:700;color:var(--slate);}
.oil-sub{font-size:12px;color:var(--stone);margin-top:2px;}
.oil-body{padding:0 14px 14px;}
.oil-input-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.oil-input-row label{font-size:13px;font-weight:600;color:var(--stone);white-space:nowrap;}
.oil-input-row input[type="number"]{flex:1;font-family:'Sarabun',sans-serif;font-size:18px;font-weight:800;color:var(--slate);border:2px solid var(--dew);border-radius:var(--radius-sm);padding:8px 12px;background:var(--sky);outline:none;text-align:center;max-width:120px;}
.oil-unit{font-size:13px;color:var(--stone);}
.oil-status{border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.oil-status.ok{background:#f0fff4;border:2px solid var(--mist);color:var(--canopy);}
.oil-status.warn{background:#fff8e1;border:2px solid #ffe082;color:#e65100;}
.oil-status.overdue{background:#fff0f0;border:2px solid #ffb3b3;color:#c0392b;}
.oil-status-icon{font-size:22px;flex-shrink:0;}
.oil-status-text .main{font-size:15px;font-weight:700;}
.oil-status-text .detail{font-size:12px;margin-top:3px;opacity:0.85;}
.oil-progress-wrap{margin-top:10px;}
.oil-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--stone);margin-bottom:4px;}
.oil-progress-bar{height:8px;background:var(--smoke);border-radius:4px;overflow:hidden;}
.oil-progress-fill{height:100%;border-radius:4px;transition:width 0.4s ease,background 0.4s;}
/* UPLOAD ZONES */
.upload-section{background:white;border-radius:var(--radius-md);border:2px solid var(--smoke);margin:20px 0 12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.upload-section-header{padding:12px 16px;display:flex;align-items:center;gap:10px;}
.upload-section-header.repair{background:linear-gradient(90deg,#6d3b47,#c0392b);}
.upload-section-header.photos{background:linear-gradient(90deg,#1a3a4a,#2980b9);}
.upload-section-title{font-size:16px;font-weight:700;color:white;}
.upload-section-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:1px;}
.upload-section-body{padding:14px;}
.drop-zone{border:2.5px dashed var(--mist);border-radius:var(--radius-sm);padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--sky);position:relative;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--fern);background:var(--dew);box-shadow:0 0 0 4px rgba(82,183,136,0.15);}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:32px;margin-bottom:6px;}
.drop-text{font-size:14px;font-weight:600;color:var(--canopy);}
.drop-sub{font-size:12px;color:var(--stone);margin-top:3px;}
.file-counter{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:var(--dew);border-radius:10px;}
.file-counter .fc-num{background:var(--canopy);color:white;width:28px;height:28px;border-radius:8px;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.file-counter .fc-label{font-size:13px;font-weight:600;color:var(--canopy);}
.fc-req{margin-left:auto;font-size:12px;}
.fc-req.met{color:var(--fern);font-weight:700;}
.fc-req.unmet{color:var(--amber);font-weight:700;}
.file-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.file-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:var(--smoke);border:2px solid var(--dew);}
.file-thumb img{width:100%;height:100%;object-fit:cover;}
.file-thumb .vid-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);font-size:28px;}
.file-thumb .remove-btn{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(192,57,43,0.85);color:white;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;}
.file-thumb .file-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;font-size:9px;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* REPAIR STATUS SECTION */
.repair-status-section{background:white;border-radius:var(--radius-md);border:2px solid var(--smoke);margin:16px 0;overflow:hidden;box-shadow:var(--shadow-sm);}
.repair-status-header{background:linear-gradient(90deg,#4a148c,#7b1fa2);padding:12px 16px;}
.repair-status-header .rs-title{font-size:15px;font-weight:700;color:white;}
.repair-status-header .rs-sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;}
.repair-status-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
.rs-empty{text-align:center;padding:16px;font-size:14px;color:var(--stone);}
.rs-add-btn{width:100%;padding:10px;border:2px dashed #ce93d8;border-radius:var(--radius-sm);background:#f3e5f5;color:#7b1fa2;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all 0.2s;}
.rs-add-btn:hover{background:#e1bee7;border-color:#7b1fa2;}
.rs-add-row{display:flex;gap:8px;margin-top:8px;}
.rs-add-input{flex:1;border:2px solid var(--dew);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'Sarabun',sans-serif;background:var(--sky);color:var(--slate);outline:none;}
.rs-add-input:focus{border-color:#7b1fa2;}
.rs-add-confirm{padding:9px 16px;background:#7b1fa2;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;}
.rs-item{border-radius:var(--radius-sm);border:2px solid var(--smoke);background:#fafafa;overflow:hidden;}
.rs-item-top{display:flex;align-items:flex-start;gap:10px;padding:11px 13px 8px;}
.rs-item-num{width:26px;height:26px;border-radius:7px;color:white;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rs-item-desc-main{font-size:14px;font-weight:700;color:var(--slate);line-height:1.35;}
.rs-item-meta{font-size:11px;color:var(--stone);margin-top:3px;}
.rs-status-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:0 13px 10px;}
.rs-btn{border-radius:8px;padding:9px 6px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:1.5px solid;transition:all 0.15s;font-family:'Sarabun',sans-serif;}
.rs-btn-pending{background:#fff8f0;color:#e65100;border-color:#ffcc80;}
.rs-btn-wip{background:#e3f2fd;color:#0d47a1;border-color:#90caf9;}
.rs-btn-done{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;}
.rs-btn-hold{background:#fce4ec;color:#880e4f;border-color:#f48fb1;}
.rs-btn.rs-active-pending{background:#e65100;color:white;border-color:#e65100;box-shadow:0 2px 8px rgba(230,81,0,0.3);}
.rs-btn.rs-active-wip{background:#1565c0;color:white;border-color:#1565c0;box-shadow:0 2px 8px rgba(21,101,192,0.3);}
.rs-btn.rs-active-done{background:#1b5e20;color:white;border-color:#1b5e20;box-shadow:0 2px 8px rgba(27,94,32,0.3);}
.rs-btn.rs-active-hold{background:#880e4f;color:white;border-color:#880e4f;box-shadow:0 2px 8px rgba(136,14,79,0.3);}
.rs-note-wrap{padding:0 13px 11px;}
.rs-note-input{width:100%;border:1.5px solid var(--dew);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Sarabun',sans-serif;background:var(--sky);color:var(--slate);outline:none;transition:border-color 0.2s;}
.rs-note-input:focus{border-color:#7b1fa2;}
/* REMARK */
.remark-section{background:white;border-radius:var(--radius-md);border:2px solid var(--smoke);margin:16px 0;overflow:hidden;box-shadow:var(--shadow-sm);}
.remark-header{background:linear-gradient(90deg,#2c3e50,#34495e);padding:11px 16px;display:flex;align-items:center;gap:8px;}
.remark-header span{font-size:15px;font-weight:700;color:white;}
.remark-required{margin-left:auto;background:var(--amber);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.remark-body{padding:14px;}
.remark-body textarea{width:100%;border:2px solid var(--dew);border-radius:var(--radius-sm);padding:10px 12px;font-family:'Sarabun',sans-serif;font-size:15px;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;color:var(--slate);background:var(--sky);line-height:1.6;}
.remark-body textarea:focus{border-color:var(--fern);}
.remark-hint{font-size:12px;color:var(--stone);margin-top:6px;}
/* SUBMIT BAR */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:3px solid var(--dew);padding:10px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(27,67,50,0.15);z-index:100;}
.bar-info{flex:1;min-width:0;}
.bar-label{font-size:12px;color:var(--stone);font-weight:600;}
.bar-count{font-size:14px;font-weight:800;color:var(--canopy);}
.bar-progress{height:5px;background:var(--smoke);border-radius:3px;margin-top:5px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--fern),var(--canopy));border-radius:3px;transition:width 0.3s ease;}
.btn-submit{background:linear-gradient(135deg,var(--canopy),var(--forest));color:white;border:none;border-radius:var(--radius-sm);padding:12px 20px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(45,106,79,0.35);transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.btn-submit:disabled{background:var(--pebble);box-shadow:none;cursor:not-allowed;}
.btn-submit:not(:disabled):active{transform:scale(0.97);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:white;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 18px 40px;box-shadow:0 -5px 30px rgba(0,0,0,0.3);animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-drag{width:40px;height:4px;background:var(--smoke);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:800;color:var(--forest);text-align:center;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--stone);text-align:center;margin-bottom:16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{border-radius:var(--radius-sm);padding:14px 10px;text-align:center;}
.stat-card.rate{background:linear-gradient(135deg,#fff8e1,#fff3cd);border:2px solid #ffd54f;}
.stat-card.pass{background:linear-gradient(135deg,var(--dew),#c3f0d8);border:2px solid var(--mist);}
.stat-card.fail{background:linear-gradient(135deg,#fff0f0,#ffe4e4);border:2px solid #ffb3b3;}
.stat-num{font-size:26px;font-weight:800;}
.stat-card.rate .stat-num{color:#f57f17;}
.stat-card.pass .stat-num{color:var(--canopy);}
.stat-card.fail .stat-num{color:#c0392b;}
.stat-lbl{font-size:11px;font-weight:600;color:var(--stone);margin-top:3px;}
.fail-section{background:#fff5f5;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;}
.fail-section-title{font-size:13px;font-weight:700;color:#c0392b;margin-bottom:8px;}
.fail-chip{display:inline-flex;align-items:center;gap:5px;background:white;border:1.5px solid #ffb3b3;border-radius:20px;padding:3px 10px;margin:3px;font-size:13px;color:#c0392b;font-weight:600;}
.line-box-label{font-size:12px;font-weight:700;color:var(--stone);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}

.btn-modal-close{background:var(--smoke);color:var(--stone);border:none;border-radius:var(--radius-sm);padding:14px 18px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.final-badge{text-align:center;padding:10px 0 16px;}

<script>
// ─── CONFIG ───
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwA36ttkWkliURUoaBvxLOL1i55NPVO-NMsOBFdzjPkF9cfzdaMxUPlPNRpv3Vs9W-khg/exec';

// ─── ROUNDS ───
const ROUNDS=[
  {id:'R1',time:'07:00'},{id:'R2',time:'09:00'},{id:'R3',time:'11:00'},
  {id:'R4',time:'13:00'},{id:'R5',time:'15:00',big:true},
];
const ROUND_TIMES={R1:420,R2:540,R3:660,R4:780,R5:900};

// ─── SECTIONS ───
const SECTIONS=[
  {key:'lawn',icon:'🌱',name:'พื้นที่สนามหญ้าและทางเดิน'},
  {key:'trees',icon:'🌳',name:'ต้นไม้และพุ่มไม้'},
  {key:'pump',icon:'🔧',name:'ปั้มลม'},
  {key:'grease',icon:'🪣',name:'ตักบ่อดักไขมัน'},
  {key:'r5only',icon:'⭐',name:'รอบที่ 5 – ดูแลความเรียบร้อยทั้งหมด (15:00 น.)'},
];

// ─── ITEMS ───
const ITEMS=[
  {id:1,sec:'lawn',name:'ทางเดินสะอาด ไม่มีใบไม้/เศษขยะกีดขวาง',hint:'กวาดทุกรอบ ตรวจทางเดินหลักและทางรอง',rounds:['R1','R2','R3','R4']},
  {id:2,sec:'lawn',name:'ตัดหญ้าสนามทั้งหมด ไม่ให้ยาวเกินไป',hint:'ใช้เครื่องตัดหญ้า',rounds:['R1','R2','R3','R4']},
  {id:3,sec:'lawn',name:'ไม่มีน้ำขังหรือกลิ่นเหม็นเน่าในสวน',hint:'ตรวจรางระบายน้ำ เปิดทางน้ำไหล',rounds:['R1','R2','R3','R4']},
  {id:4,sec:'lawn',name:'รดน้ำทั่วบริเวณพื้นหญ้า',hint:'รดน้ำวันละ 1-2 ครั้ง ตามสภาพอากาศ',rounds:['R1','R2','R3','R4','R5']},
  {id:5,sec:'lawn',name:'ท่อน้ำและระบบรดน้ำใช้งานได้ ไม่รั่ว',hint:'เปิดทดสอบทุกรอบ พบรั่ว → แจ้ง + บันทึกชำรุด',rounds:['R1','R2','R3','R4']},
  {id:6,sec:'lawn',name:'โคมไฟสวน / หลอดไฟทางเดิน ติดครบ',hint:'แจ้งช่างเปลี่ยนทันทีเมื่อพบดับ',rounds:['R1','R2','R3','R4']},
  {id:7,sec:'lawn',name:'ไม่มีแมลงศัตรูพืช / รังมด / รังแมลงในสวน',hint:'กำจัดทันทีที่พบ',rounds:['R1','R2','R3','R4']},
  {id:8,sec:'trees',name:'ต้นไม้/พุ่มไม้ ไม่มีกิ่งห้อยต่ำกีดขวาง',hint:'ตัดกิ่งที่ห้อยต่ำกว่า 2 เมตร',rounds:['R1','R2','R3','R4']},
  {id:9,sec:'trees',name:'ต้นไม้ได้รับน้ำครบ ดินไม่แห้งแตก',hint:'รดน้ำตามกำหนด ตรวจความชื้นดิน',rounds:['R1','R2','R3','R4']},
  {id:10,sec:'trees',name:'ใบไม้สีเขียวสดใส ไม่เหลืองหรือร่วงผิดปกติ',hint:'หากพบเหลืองผิดปกติ หาวิธีจัดการทันที',rounds:['R1','R2','R3','R4']},
  {id:11,sec:'trees',name:'พุ่มไม้ทรงพุ่มสวยงาม ไม่รกทะมึน',hint:'ตัดแต่งตามรูปทรงที่กำหนด',rounds:['R1','R2','R3','R4']},
  {id:12,sec:'trees',name:'ระบบน้ำหยด / สปริงเกอร์ ทำงานได้ปกติ',hint:'พบชำรุด → แจ้ง + บันทึกชำรุดทันที',rounds:['R1','R2','R3','R4']},
  {id:13,sec:'trees',name:'กระถาง / แปลงดอกไม้ สะอาด ไม่มีเศษขยะ',hint:'เก็บเศษใบและขยะออกจากกระถางทุกรอบ',rounds:['R1','R2','R3','R4']},
  {id:14,sec:'pump',name:'พื้นที่ปั้มลมสะอาดไม่มีขยะ',hint:'เก็บเศษใบและขยะออกจากพื้นที่ทุกรอบ',rounds:['R1','R5']},
  {id:15,sec:'pump',name:'เครื่องปั้มลมพร้อมใช้งาน',hint:'ตรวจช่วงเช้า/และก่อนเลิกงาน',rounds:['R1','R5']},
  {id:16,sec:'pump',name:'หน้าจอแสดงผลปกติ',hint:'ตรวจช่วงเช้า/และก่อนเลิกงาน',rounds:['R1','R5']},
  {id:17,sec:'pump',name:'หัวเติมลม สายลมไม่แตก ไม่ร้าว ไม่ชำรุด',hint:'ตรวจช่วงเช้า/และก่อนเลิกงาน',rounds:['R1','R5']},
  {id:18,sec:'pump',name:'บันทึกชั่วโมงเครื่องปั้มลม',hint:'ตรวจเช็คทุก 500 ชั่วโมง',rounds:['R1','R5'],special:'oil'},
  {id:19,sec:'grease',name:'ตักไขมันลอยผิวหน้าบ่อออก',hint:'ตักจนเหลือคราบไขมันบาง ๆ',rounds:['R5']},
  {id:20,sec:'grease',name:'ตักเศษอาหาร/สิ่งปฏิกูลออก',hint:'นำใส่ถุงขยะปิดมิดชิด',rounds:['R5']},
  {id:21,sec:'grease',name:'ทำความสะอาดขอบบ่อและฝาบ่อ',hint:'เช็ดคราบไขมันและล้างพื้นที่โดยรอบ',rounds:['R5']},
  {id:22,sec:'grease',name:'ไม่มีกลิ่นเหม็นรุนแรง',hint:'ตักไขมันและทำความสะอาดบ่อ',rounds:['R5']},
  {id:23,sec:'grease',name:'น้ำไหลเข้าบ่อและไหลออกจากบ่อตามปกติ',hint:'ตรวจจุดอุดตันบริเวณท่อน้ำเข้า/ออก',rounds:['R5']},
  {id:24,sec:'r5only',name:'ใส่ปุ๋ยต้นไม้ตามแผน (ต้นที่กำหนดในวันนั้น)',hint:'ใส่ปุ๋ยตามปริมาณที่กำหนด',rounds:['R5']},
  {id:25,sec:'r5only',name:'พ่นยาฆ่าแมลงบริเวณที่พบการระบาด',hint:'สวมอุปกรณ์ป้องกัน ติดป้ายเตือนหลังพ่น',rounds:['R5']},
  {id:26,sec:'r5only',name:'ล้างทำความสะอาดทางเดินและลานสวนทั้งหมด',hint:'ใช้สายยางล้าง ไล่น้ำเข้ารางระบาย',rounds:['R5']},
  {id:27,sec:'r5only',name:'ตรวจและล้างท่อระบายน้ำในสวนทั้งหมด',hint:'เปิดฝาท่อ เอาเศษใบออก ตรวจน้ำระบายได้ดี',rounds:['R5']},
  {id:28,sec:'r5only',name:'รดน้ำต้นไม้ทั้งหมด (รอบใหญ่)',hint:'รดให้ชุ่มถึงราก ตรวจน้ำไหลทั่วถึง',rounds:['R5']},
  {id:29,sec:'r5only',name:'ตรวจสภาพรั้วและทางเดิน พบชำรุดบันทึก',hint:'ตรวจรั้ว ประตู ไฟ รางน้ำ รายงานทันที',rounds:['R5']},
  {id:30,sec:'r5only',name:'เก็บขยะและใบไม้ในสวนทั้งหมดใส่ถุง',hint:'วางถุงขยะที่จุดรับขยะ ไม่ทิ้งค้างในสวน',rounds:['R5']},
  {id:31,sec:'r5only',name:'ล้างและจัดเก็บอุปกรณ์สวนให้เรียบร้อย',hint:'ล้างกรรไกร จอบ สายยาง เก็บเข้าห้องอุปกรณ์',rounds:['R5']},
];

// ─── STATE ───
let currentRound='R1';
const answers={};
const remarks={};
const roundData={};
let timeInterval;
if(!window._fileStore) window._fileStore={};

// repairLog: [{id,desc,reportedRid,reportedTime,status,note}]
const repairLog=[];

// ─── HELPERS ───
function getISODate(){return new Date().toISOString().split('T')[0];}
function getNow(){return new Date().toTimeString().slice(0,5);}
function pad2(n){return String(n).padStart(2,'0');}
function getStore(type,rid){const k=type+'_'+rid;if(!window._fileStore[k])window._fileStore[k]=[];return window._fileStore[k];}

// ─── LOAD STAFF ───
async function loadStaff(){
  const sel=document.getElementById('sel-name');
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL.includes('YOUR_')){
    sel.innerHTML='<option value="ธีระศักดิ์  พรสิงห์">ธีระศักดิ์  พรสิงห์</option>';
    return;
  }
  sel.disabled=true;
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?action=getStaff',{redirect:'follow'});
    const data=await res.json();
    if(data.ok&&data.staff&&data.staff.length>0){
      sel.innerHTML=data.staff.map(s=>`<option value="${s.name}">${s.name}${s.position?' ('+s.position+')':''}</option>`).join('');
    } else {
      sel.innerHTML='<option value="ธีระศักดิ์  พรสิงห์">ธีระศักดิ์  พรสิงห์</option>';
    }
  }catch(e){
    sel.innerHTML='<option value="ธีระศักดิ์  พรสิงห์">ธีระศักดิ์  พรสิงห์</option>';
  }finally{sel.disabled=false;}
}

// ─── BUILD UI ───
function init(){
  document.getElementById('disp-date').textContent=getISODate();
  document.getElementById('disp-time').textContent=getNow()+' น.';
  timeInterval=setInterval(()=>{document.getElementById('disp-time').textContent=getNow()+' น.';},30000);
  buildRoundBtns();
  buildPanels();
  switchRound('R1');
  loadStaff();
}

function buildRoundBtns(){
  const grid=document.getElementById('rounds-grid');
  ROUNDS.forEach(r=>{
    const btn=document.createElement('div');
    btn.className='round-btn';btn.id='rbtn-'+r.id;
    btn.innerHTML=`<span class="r-id">${r.id}</span><span class="r-time">${r.time}</span><span class="r-status">✓</span>`;
    btn.onclick=()=>switchRound(r.id);
    grid.appendChild(btn);
  });
}

function buildPanels(){
  const wrap=document.getElementById('panels-wrap');
  ROUNDS.forEach(r=>{
    const panel=document.createElement('div');
    panel.className='round-panel';panel.id='panel-'+r.id;
    const circ=2*Math.PI*22;
    panel.innerHTML=`
      <div class="panel-header">
        <div><div class="panel-header-round">${r.id} – ${r.time} น.</div>
        <div class="panel-header-sub">${r.big?'⭐ รอบดูแลใหญ่':'ตรวจสอบและบันทึก'}</div></div>
        <div class="panel-progress-ring">
          <svg class="progress-svg" width="52" height="52" viewBox="0 0 52 52">
            <circle class="progress-track" cx="26" cy="26" r="22"/>
            <circle class="progress-arc" id="parc-${r.id}" cx="26" cy="26" r="22"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"/>
          </svg>
          <div class="progress-text" id="ptxt-${r.id}">0%</div>
        </div>
      </div>`;
    let lastSec=null;
    ITEMS.forEach(item=>{
      const applicable=item.rounds.includes(r.id);
      if(!applicable) return;
      const sec=SECTIONS.find(s=>s.key===item.sec);
      if(item.sec!==lastSec){
        const secItems=ITEMS.filter(i=>i.sec===item.sec&&i.rounds.includes(r.id));
        panel.innerHTML+=`<div class="section-header"><span class="sec-icon">${sec.icon}</span><span class="sec-text">${sec.name}</span><span class="sec-count">${secItems.length} รายการ</span></div>`;
        lastSec=item.sec;
      }
      panel.innerHTML+=buildCheckItem(item,r.id);
    });
    // Upload: repair photos
    panel.innerHTML+=`
      <div class="upload-section">
        <div class="upload-section-header repair"><div>
          <div class="upload-section-title">🔧 ── แจ้งซ่อม / ปัญหา ──</div>
          <div class="upload-section-sub">แนบภาพหรือวิดีโอหากพบปัญหา (ถ้ามี)</div>
        </div></div>
        <div class="upload-section-body">
          <div class="drop-zone" id="repair-drop-${r.id}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event,'repair-drop-${r.id}')" ondrop="onDrop(event,'repair','${r.id}')">
            <input type="file" accept="image/*,video/*" multiple onchange="onFileChange(event,'repair','${r.id}')">
            <div class="drop-icon">📎</div><div class="drop-text">แตะเพื่อเลือกไฟล์</div>
            <div class="drop-sub">ภาพ / วิดีโอ (ถ้ามี)</div>
          </div>
          <div class="file-counter" id="repair-counter-${r.id}" style="display:none">
            <div class="fc-num" id="repair-num-${r.id}">0</div>
            <div class="fc-label" id="repair-label-${r.id}">ไฟล์แนบ</div>
          </div>
          <div class="file-grid" id="repair-grid-${r.id}"></div>
        </div>
      </div>`;
    // Upload: clean photos
    panel.innerHTML+=`
      <div class="upload-section">
        <div class="upload-section-header photos"><div>
          <div class="upload-section-title">📸 ── รูปภาพการทำความสะอาด ──</div>
          <div class="upload-section-sub">อย่างน้อย 5 ภาพ (จำเป็น)</div>
        </div></div>
        <div class="upload-section-body">
          <div class="drop-zone" id="clean-drop-${r.id}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event,'clean-drop-${r.id}')" ondrop="onDrop(event,'clean','${r.id}')">
            <input type="file" accept="image/*,video/*" multiple onchange="onFileChange(event,'clean','${r.id}')">
            <div class="drop-icon">🖼️</div><div class="drop-text">แตะเพื่อเพิ่มภาพ</div>
            <div class="drop-sub">เลือกได้ทีละหลายภาพ</div>
          </div>
          <div class="file-counter" id="clean-counter-${r.id}">
            <div class="fc-num" id="clean-num-${r.id}">0</div>
            <div class="fc-label">ภาพทำความสะอาด</div>
            <span class="fc-req unmet" id="clean-req-${r.id}">ต้องการ 5+ ภาพ</span>
          </div>
          <div class="file-grid" id="clean-grid-${r.id}"></div>
        </div>
      </div>`;
    // Repair Status Section
    panel.innerHTML+=`
      <div class="repair-status-section" id="rs-section-${r.id}">
        <div class="repair-status-header">

// ─── OIL METER ───
function calcOil(rid,key){
  const cur=parseFloat(document.getElementById('oil-current-'+rid)?.value)||0;
  const last=parseFloat(document.getElementById('oil-last-'+rid)?.value)||0;
  const used=Math.max(0,cur-last);
  const remaining=500-used;
  const pct=Math.min(100,Math.round(used/500*100));
  const progLabel=document.getElementById('oil-prog-label-'+rid);
  const fillEl=document.getElementById('oil-prog-fill-'+rid);
  const statusEl=document.getElementById('oil-status-'+rid);
  if(progLabel) progLabel.textContent=`${used} / 500 ชม.`;
  let fillColor,statusClass,icon,mainText,detailText;
  if(used<400){fillColor='var(--fern)';statusClass='ok';icon='✅';mainText='ปกติ — ยังไม่ถึงรอบเปลี่ยนถ่ายน้ำมัน';detailText=`ใช้ไปแล้ว ${used} ชม. | เหลืออีก ${remaining} ชม.`;}
  else if(used<500){fillColor='#ffb300';statusClass='warn';icon='⚠️';mainText='ใกล้ถึงรอบเปลี่ยนถ่ายน้ำมันแล้ว!';detailText=`ใช้ไปแล้ว ${used} ชม. | เหลืออีก ${remaining} ชม.`;}
  else{fillColor='var(--coral)';statusClass='overdue';icon='🔧';mainText='เลยรอบเปลี่ยนถ่ายน้ำมันแล้ว!';detailText=`เกินกำหนด ${Math.abs(remaining)} ชม. — ต้องเปลี่ยนน้ำมันด่วน!`;}
  if(statusEl){statusEl.className='oil-status '+statusClass;statusEl.innerHTML=`<span class="oil-status-icon">${icon}</span><div class="oil-status-text"><div class="main">${mainText}</div><div class="detail">${detailText}</div></div>`;}
  if(fillEl){fillEl.style.width=pct+'%';fillEl.style.background=fillColor;}
  answers[key]=cur>0?'oil_logged':null;
  updateProgress(rid);
}

// ─── FILE UPLOAD ───
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDragLeave(e,id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,rid){e.preventDefault();document.getElementById(type+'-drop-'+rid)?.classList.remove('drag-over');addFiles(type,rid,Array.from(e.dataTransfer.files));}
function onFileChange(e,type,rid){addFiles(type,rid,Array.from(e.target.files));e.target.value='';}
function addFiles(type,rid,newFiles){
  const store=getStore(type,rid);
  newFiles.forEach(f=>store.push(f));
  renderFileGrid(type,rid);updateFileCounter(type,rid);updateSubmitBtn();
  showToast('✅ เพิ่ม '+newFiles.length+' ไฟล์ (รวม '+store.length+' ไฟล์)');
}
function removeFile(type,rid,idx){const store=getStore(type,rid);store.splice(idx,1);renderFileGrid(type,rid);updateFileCounter(type,rid);updateSubmitBtn();}
function renderFileGrid(type,rid){
  const store=getStore(type,rid);
  const grid=document.getElementById(type+'-grid-'+rid);if(!grid)return;
  grid.innerHTML='';
  store.forEach((f,idx)=>{
    const thumb=document.createElement('div');thumb.className='file-thumb';
    const isVid=f.type.startsWith('video/');
    thumb.innerHTML=isVid?`<div class="vid-badge">▶️</div><div class="file-name">${f.name}</div>`:`<img src="${URL.createObjectURL(f)}" loading="lazy"><div class="file-name">${f.name}</div>`;
    thumb.innerHTML+=`<button class="remove-btn" onclick="removeFile('${type}','${rid}',${idx})">✕</button>`;
    grid.appendChild(thumb);
  });
}
function updateFileCounter(type,rid){
  const n=getStore(type,rid).length;
  const numEl=document.getElementById(type+'-num-'+rid);
  if(numEl) numEl.textContent=n;
  if(type==='repair'){
    const ctr=document.getElementById('repair-counter-'+rid);
    if(ctr) ctr.style.display=n>0?'flex':'none';
    const lbl=document.getElementById('repair-label-'+rid);
    if(lbl) lbl.textContent=n===1?'ไฟล์แนบ':'ไฟล์แนบ ('+n+' ไฟล์)';
  }
  if(type==='clean'){
    const req=document.getElementById('clean-req-'+rid);
    if(req){
      if(n>=5){req.textContent='✅ ครบแล้ว ('+n+' ภาพ)';req.className='fc-req met';}
      else{req.textContent='ต้องการ '+(5-n)+' ภาพอีก';req.className='fc-req unmet';}
    }
  }
}

function confirmAddRepair(rid){

// ─── ANSWER & PROGRESS ───
function setAns(key,val,rid){
  answers[key]=val;
  const ci=document.getElementById('ci-'+key);
  const bp=document.getElementById('bp-'+key);
  const bf=document.getElementById('bf-'+key);
  ci?.classList.toggle('passed',val==='pass');
  ci?.classList.toggle('failed',val==='fail');
  bp?.classList.toggle('sel',val==='pass');
  bf?.classList.toggle('sel',val==='fail');
  updateProgress(rid);
}

function getItemsForRound(rid){return ITEMS.filter(i=>i.rounds.includes(rid));}

function updateProgress(rid){
  const items=getItemsForRound(rid);
  const total=items.length;
  const answered=items.filter(i=>answers[rid+'_'+i.id]).length;
  const pct=total>0?Math.round(answered/total*100):0;
  const circ=2*Math.PI*22;
  const arc=document.getElementById('parc-'+rid);
  const txt=document.getElementById('ptxt-'+rid);
  if(arc) arc.style.strokeDashoffset=(circ*(1-pct/100)).toFixed(2);
  if(txt) txt.textContent=pct+'%';
  if(rid!==currentRound)return;
  document.getElementById('bar-count').textContent='ตอบแล้ว '+answered+'/'+total+' รายการ';
  document.getElementById('bar-fill').style.width=pct+'%';
  updateSubmitBtn();
}

function onRemarkInput(rid){
  remarks[rid]=document.getElementById('remark-'+rid)?.value.trim()||'';
  updateSubmitBtn();
}

function updateSubmitBtn(){
  const rid=currentRound;
  const items=getItemsForRound(rid);
  const regularItems=items.filter(i=>!i.special);
  const allRegularOk=regularItems.every(i=>answers[rid+'_'+i.id]==='pass'||answers[rid+'_'+i.id]==='fail');
  const oilItem=items.find(i=>i.special==='oil');
  const oilOk=!oilItem||answers[rid+'_'+oilItem.id]==='oil_logged';
  const cleanCount=getStore('clean',rid).length;
  const remarkOk=(remarks[rid]||'').length>0;
  const canSubmit=allRegularOk&&oilOk&&cleanCount>=5&&remarkOk;
  const btn=document.getElementById('btn-submit');
  btn.disabled=!canSubmit;
  const label=btn.querySelector('span:first-child');
  if(!allRegularOk) label.textContent='กรอกให้ครบก่อน';
  else if(oilItem&&!oilOk) label.textContent='กรอกชั่วโมงปั้มลมด้วย';
  else if(cleanCount<5) label.textContent='ต้องการภาพ '+(5-cleanCount)+' ภาพ';
  else if(!remarkOk) label.textContent='กรอกหมายเหตุด้วย';
  else label.textContent='ส่งรอบนี้';
}

function switchRound(rid){
  currentRound=rid;
  document.querySelectorAll('.round-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.round-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+rid)?.classList.add('active');
  document.getElementById('rbtn-'+rid)?.classList.add('active');
  refreshRepairSection(rid);
  updateProgress(rid);
  updateSubmitBtn();
}

// ─── SUBMIT ───
function submitRound(){
  const rid=currentRound;
  const items=getItemsForRound(rid);
  const regularItems=items.filter(i=>!i.special);
  const passed=regularItems.filter(i=>answers[rid+'_'+i.id]==='pass');
  const failed=regularItems.filter(i=>answers[rid+'_'+i.id]==='fail');
  const total=regularItems.length;
  const rate=total>0?Math.round(passed.length/total*100):0;
  const now=getNow();
  const today=getISODate();
  const name=document.getElementById('sel-name').value;
  const loc=document.getElementById('sel-loc').value;
  const oilItem=items.find(i=>i.special==='oil');
  let oilStatus=null,oilCurrent=0,oilLast=0;
  if(oilItem){
    oilCurrent=parseFloat(document.getElementById('oil-current-'+rid)?.value)||0;
    oilLast=parseFloat(document.getElementById('oil-last-'+rid)?.value)||0;
    const used=Math.max(0,oilCurrent-oilLast);const rem=500-used;
    if(oilCurrent>0){
      if(used<400) oilStatus=`✅ ปกติ (${used}/500 ชม. เหลือ ${rem} ชม.)`;
      else if(used<500) oilStatus=`⚠️ ใกล้ถึงรอบ (${used}/500 ชม. เหลือ ${rem} ชม.)`;
      else oilStatus=`🔧 เกินรอบ! (${used} ชม. เกิน ${Math.abs(rem)} ชม.)`;
    }
  }

  // passedNums: จำนวนผ่านแต่ละหมวด (ส่งแค่ตัวเลข ไม่ส่ง array ชื่อ)
  const SECTION_KEYS = {
    lawn:{keys:['lawn'],label:'lawn'}, trees:{keys:['trees'],label:'trees'},
    pump:{keys:['pump'],label:'pump'}, grease:{keys:['grease'],label:'grease'},
    r5only:{keys:['r5only'],label:'r5'},
  };
  const passedNums={};
  Object.entries(SECTION_KEYS).forEach(([sec,cfg])=>{
    const secItems=regularItems.filter(i=>i.sec===sec);
    if(secItems.length===0) return;
    const secPassed=secItems.filter(i=>answers[rid+'_'+i.id]==='pass').length;
    passedNums[cfg.label]={passed:secPassed,total:secItems.length};
  });

  // failedItems พร้อม hint (รูปแบบ "หมายเลข. ชื่อ|hint")
  const failedItems=failed.map(i=>i.id+'. '+i.name+'|'+i.hint);
  // passedItems เก็บไว้ใน Sheet เท่านั้น (ส่งแค่ชื่อรวมกัน)
  const passedItemsForSheet=passed.map(i=>i.id+'. '+i.name);

  const data={
    rid,time:now,date:today,name,loc,
    passed:passed.length,failed:failed.length,total,rate,
    failedItems,          // ส่งพร้อม hint → LINE card
    passedItems:passedItemsForSheet, // เก็บ Sheet (ไม่ส่ง LINE)
    passedNums,           // สรุปหมวด → LINE card
    remark:remarks[rid]||'',
    repairFiles:getStore('repair',rid).length,
    cleanFiles:getStore('clean',rid).length,
    oilStatus,oilCurrent,oilLast,
    checkinTime:now,
  };
  roundData[rid]=data;
  document.getElementById('rbtn-'+rid)?.classList.add('done');
  sendToServer(rid,data);
  if(rid==='R5') showFinalModal(data);
  else showRoundModal(data);
}

// ─── MODAL ───
function showRoundModal(data){
  document.getElementById('modal-title').textContent='✅ สรุปผล '+data.rid;
  document.getElementById('modal-sub').textContent=`${data.rid} (${data.time} น.) | ${data.date}`;
  const failSection=data.failedItems.length>0?`
    <div class="fail-section">
      <div class="fail-section-title">❌ รายการที่ไม่ผ่าน</div>
      ${data.failedItems.map(f=>`<span class="fail-chip">⚠️ ${f}</span>`).join('')}
    </div>`:'';
  document.getElementById('modal-body').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card rate"><div class="stat-num">${data.rate}%</div><div class="stat-lbl">อัตราผ่าน</div></div>
      <div class="stat-card pass"><div class="stat-num">${data.passed}</div><div class="stat-lbl">ผ่าน</div></div>
      <div class="stat-card fail"><div class="stat-num">${data.failed}</div><div class="stat-lbl">ไม่ผ่าน</div></div>
    </div>${failSection}`;
  window._lineMsg='';
  document.getElementById('modal').classList.remove('hidden');
}

function showFinalModal(lastData){
  const name=lastData.name;const date=lastData.date;
  let totalPass=0,totalFail=0,totalItems=0;
  ROUNDS.forEach(r=>{const d=roundData[r.id];if(d){totalPass+=d.passed;totalFail+=d.failed;totalItems+=d.total;}});
  const overallRate=totalItems>0?Math.round(totalPass/totalItems*100):0;
  const roundRowsHtml=ROUNDS.map(r=>{
    const d=roundData[r.id];
    if(!d)return`<div class="round-summary-row"><div class="rsr-label">${r.id}</div><div class="rsr-bar-wrap"><div class="rsr-bar-bg"><div class="rsr-bar-fill" style="width:0%"></div></div></div><div class="rsr-stats">–</div></div>`;
    return`<div class="round-summary-row"><div class="rsr-label">${r.id}</div><div class="rsr-bar-wrap"><div class="rsr-bar-bg"><div class="rsr-bar-fill" style="width:${d.rate}%"></div></div></div><div class="rsr-stats">${d.rate}%</div>${d.failed>0?`<div class="rsr-fail-count">❌${d.failed}</div>`:''}</div>`;
  }).join('');
  document.getElementById('modal-title').textContent='🏁 สรุปการทำงานทั้งวัน';
  document.getElementById('modal-sub').textContent=`R1–R5 | ${date} | ${name}`;
  document.getElementById('modal-body').innerHTML=`
    <div class="final-badge"><div class="fb-icon">🎉</div><div class="fb-text">เสร็จสิ้นครบทุกรอบ!</div></div>
    <div class="stat-grid">
      <div class="stat-card rate"><div class="stat-num">${overallRate}%</div><div class="stat-lbl">อัตราผ่านรวม</div></div>
      <div class="stat-card pass"><div class="stat-num">${totalPass}</div><div class="stat-lbl">ผ่านรวม</div></div>
      <div class="stat-card fail"><div class="stat-num">${totalFail}</div><div class="stat-lbl">ไม่ผ่านรวม</div></div>
    </div>${roundRowsHtml}`;
  window._lineMsg='';
  document.getElementById('modal').classList.remove('hidden');
}

function copyLine(){
  const msg=window._lineMsg||'(ยังไม่มีข้อความ)';
  if(navigator.clipboard){navigator.clipboard.writeText(msg).then(()=>showToast('✅ คัดลอกแล้ว! วางในไลน์ได้เลย')).catch(fallbackCopy);}
  else fallbackCopy();
  function fallbackCopy(){const ta=document.createElement('textarea');ta.value=msg;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ คัดลอกแล้ว!');}
}

// ─── SERVER ───
function fileToBase64(file){
  // บีบอัดรูปให้เล็กลงอีก เพื่อให้พอดี GET URL limit แน่นอน และอัปโหลดเร็วขึ้น
  return new Promise((resolve,reject)=>{
    if(!file.type || !file.type.startsWith('image/')){
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.onerror=reject;
      reader.readAsDataURL(file);
      return;
    }
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const maxDim=320; // ลดจาก 480 → 320 ให้ไฟล์เล็กลงและอัปโหลดเร็วขึ้น
      let w=img.width, h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      // ลดคุณภาพจาก 0.5 → 0.35 ให้ไฟล์เล็กลงอีก ยังพอมองออกว่าเป็นรูปอะไร
      let dataUrl=canvas.toDataURL('image/jpeg',0.35);
      // ถ้ายังใหญ่เกินไป ลดคุณภาพซ้ำอีกรอบ
      if(dataUrl.length>9000){
        dataUrl=canvas.toDataURL('image/jpeg',0.2);
      }
      resolve(dataUrl.split(',')[1]);
    };
    img.onerror=()=>{
      URL.revokeObjectURL(url);
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.onerror=reject;
      reader.readAsDataURL(file);
    };
    img.src=url;
  });
}

async function uploadFilesForRound(rid,date){
  const result={cleanFolderUrl:null,repairFolderUrl:null,driveLinks:[]};
  const cats=[{type:'repair',label:'แจ้งซ่อม',urlKey:'repairFolderUrl'},{type:'clean',label:'ทำความสะอาด',urlKey:'cleanFolderUrl'}];

  for(const cat of cats){
    const files=getStore(cat.type,rid);
    if(!files||files.length===0) continue;

    // อัปโหลดทีละไฟล์ — แต่ละ request เล็กพอสำหรับ GET URL limit
    for(const f of files){
      try{
        const b64=await fileToBase64(f);
        const payload={
          name:f.name, base64:b64, mimeType:f.type||'image/jpeg',
        };
        const res=await postToServer({
          type:'upload', date, rid, category:cat.label,
          files:[payload],
        });
        if(res.ok){
          if(res.links) result.driveLinks.push(...res.links);
          if(res.folderUrl) result[cat.urlKey]=res.folderUrl;
        } else {
          console.warn('upload failed for', f.name, res.error);
        }
      }catch(e){
        console.warn('skip file', f.name, e.message);
      }
    }
  }
  return result;
}

async function sendToServer(rid,data){
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL.includes('YOUR_')){console.warn('URL not set');return;}
  showToast('⏳ กำลังส่งข้อมูล...');
  try{
    // 1. อัปโหลดรูปก่อน
    console.log('[1] uploading files...');
    const{cleanFolderUrl,repairFolderUrl}=await uploadFilesForRound(rid,data.date);

    // 2. ส่งข้อมูลรอบ
    const oilCurrent=data.oilCurrent||0;
    const oilLast=data.oilLast||0;
    const repairStatus=collectRepairStatus(rid);
    const roundPayload={
      type:'round',
      rid:data.rid, date:data.date, time:data.time, checkinTime:data.checkinTime,
      name:data.name, loc:data.loc,
      passed:data.passed, failed:data.failed, total:data.total, rate:data.rate,
      failedItems:data.failedItems,
      passedNums:data.passedNums,
      remark:data.remark, oilStatus:data.oilStatus,
      oilCurrent, oilLast,
      repairFiles:data.repairFiles, cleanFiles:data.cleanFiles,
      cleanFolderUrl:cleanFolderUrl||null,
      repairFolderUrl:repairFolderUrl||null,
      repairStatus,
    };
    showToast('📤 กำลังส่ง Card 1...');
    console.log('[2] posting round...');
    const rRes=await postToServer(roundPayload);
    console.log('[2] round response:',JSON.stringify(rRes).slice(0,100));

    // 3. ส่ง repair status (ถ้ามี)
    if(repairLog.length>0){
      showToast('📤 กำลังส่ง Card 3...');
      console.log('[3] posting repair_status...');
      const rrRes=await postToServer({
        type:'repair_status',
        rid,date:data.date,time:data.time,name:data.name,loc:data.loc,
        repairStatus,
      });
      console.log('[3] repair response:',JSON.stringify(rrRes).slice(0,100));
    }

    // 4. ส่งสรุปประจำวัน R5
    if(rid==='R5'){
      showToast('📤 กำลังส่ง Card 2 (สรุปวัน)...');
      console.log('[4] posting daily_summary...');
      const sRes=await postToServer({
        type:'daily_summary',
        date:data.date, name:data.name, loc:data.loc,
        oilStatus:data.oilStatus||null,
      });
      console.log('[4] summary response:',JSON.stringify(sRes).slice(0,200));
    }

    refreshAllRepairSections();
    showToast('✅ บันทึกและส่ง LINE เรียบร้อย!');
    console.log('ALL DONE ✅');
  }catch(err){
    console.error('sendToServer ERROR:',err.message,err);
    showToast('⚠️ Error: '+err.message);
  }
}

async function postToServer(payload){
  console.log('[DEBUG] sending type:', payload.type);

  // upload ไฟล์ → ใช้ GET ?data= เหมือนกัน เพื่อให้ได้ folderUrl กลับมาจริง
  // (no-cors POST ไม่ return body เลย ทำให้ folderUrl เป็น null ตลอด)
  if (payload.type === 'upload') {
    const json = JSON.stringify(payload);
    const url  = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(json);
    console.log('[DEBUG] upload GET url length:', url.length);

    // ถ้า payload ใหญ่เกิน URL limit (~8000 chars) ต้องลดขนาดรูปก่อนส่ง
    if (url.length > 7800) {
      console.warn('[DEBUG] upload payload too large for GET:', url.length);
      return { ok:false, error:'payload too large', folderUrl:null, links:[] };
    }

    try {
      const res  = await fetch(url, { redirect:'follow' });
      const text = await res.text();
      console.log('[DEBUG] upload GET response:', text.slice(0,200));
      try { return JSON.parse(text); }
      catch(e) { return { ok:true, folderUrl:null, links:[] }; }
    } catch(e) {
      console.error('[DEBUG] upload GET failed:', e.message);
      return { ok:false, folderUrl:null, links:[] };
    }
  }

  // ข้อมูลอื่น (round, repair_status, daily_summary) → ใช้ GET ?data=
  const json = JSON.stringify(payload);
  const url = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(json);
  console.log('[DEBUG] GET url length:', url.length);
  try {
    const res = await fetch(url, { redirect: 'follow' });
    console.log('[DEBUG] GET status:', res.status, res.type);
    const text = await res.text();
    console.log('[DEBUG] GET response:', text.slice(0, 300));
    try { return JSON.parse(text); }
    catch(e) { return { ok: true }; }
  } catch(err) {
    console.error('[DEBUG] GET failed:', err.message);
    throw err;
  }
}

function refreshAllRepairSections(){ROUNDS.forEach(r=>refreshRepairSection(r.id));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}

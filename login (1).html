<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ – บริษัท เอวิน โฮลดิ้ง จำกัด</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans','Roboto','Noto Sans Thai',Arial,sans-serif;
    background: linear-gradient(135deg, #4a148c 0%, #880e4f 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  .login-wrap { width: 100%; max-width: 420px; }

  .logo-area {
    text-align: center; margin-bottom: 28px;
  }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin: 0 auto 14px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .logo-area h1 { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .logo-area p { font-size: 13px; color: rgba(255,255,255,0.7); }

  .card {
    background: #fff; border-radius: 16px;
    padding: 32px 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .card h2 { font-size: 18px; font-weight: 500; color: #202124; margin-bottom: 6px; }
  .card .subtitle { font-size: 13px; color: #5f6368; margin-bottom: 24px; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #5f6368; margin-bottom: 7px; letter-spacing: 0.3px; }
  .field select, .field input[type=time] {
    width: 100%; padding: 11px 14px; font-size: 14px;
    color: #202124; background: #f8f9fa;
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    outline: none; font-family: inherit; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    appearance: auto;
  }
  .field select:focus, .field input[type=time]:focus {
    border-color: #7b1fa2; background: #fff;
    box-shadow: 0 0 0 3px rgba(123,31,162,0.1);
  }

  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .location-btn {
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 14px 8px; background: #f8f9fa;
    cursor: pointer; text-align: center;
    transition: all 0.18s; font-family: inherit;
  }
  .location-btn:hover { border-color: #7b1fa2; background: #f3e5f5; }
  .location-btn.selected { border-color: #7b1fa2; background: #f3e5f5; box-shadow: 0 0 0 3px rgba(123,31,162,0.12); }
  .location-btn .loc-icon { font-size: 22px; margin-bottom: 5px; display: block; }
  .location-btn .loc-name { font-size: 13px; font-weight: 500; color: #202124; }
  .location-btn .loc-form { font-size: 11px; color: #7b1fa2; margin-top: 2px; }

  .time-row { display: flex; gap: 10px; align-items: flex-end; }
  .time-row .field { flex: 1; margin-bottom: 0; }
  .now-btn {
    flex-shrink: 0; padding: 11px 14px; font-size: 12px; font-weight: 500;
    background: #f3e5f5; color: #7b1fa2;
    border: 1.5px solid #ce93d8; border-radius: 8px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: background 0.15s;
  }
  .now-btn:hover { background: #e1bee7; }

  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 22px 0; }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7b1fa2, #c2185b);
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: inherit; letter-spacing: 0.3px;
    transition: opacity 0.18s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.92; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .error-msg {
    display: none; background: #fce4ec; color: #c62828;
    border: 1px solid #f48fb1; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-top: 14px; text-align: center;
  }

  .footer-note { text-align: center; font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 20px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">⛽</div>
    <h1>บริษัท เอวิน โฮลดิ้ง จำกัด</h1>
    <p>ระบบบันทึกการปฏิบัติงาน</p>
  </div>

  <div class="card">
    <h2>เข้าสู่ระบบ / Check-in</h2>
    <p class="subtitle">เลือกชื่อพนักงาน จุดปฏิบัติงาน และเวลาเข้างาน</p>

    <!-- ชื่อพนักงาน -->
    <div class="field">
      <label>👤 ชื่อพนักงาน / Employee</label>
      <select id="sel-name">
        <option value="">-- เลือกชื่อพนักงาน --</option>
        <option value="ธีระศักดิ์  พรสิงห์|gardener">ธีระศักดิ์  พรสิงห์</option>
      </select>
    </div>

    <!-- จุดเช็คอิน -->
    <div class="field">
      <label>📍 จุดปฏิบัติงาน / Check-in Location</label>
      <div class="location-grid" id="loc-grid">
        <button type="button" class="location-btn" data-loc="สวน/ทางเดิน" data-type="gardener" onclick="selectLoc(this)">
          <span class="loc-icon">🌿</span>
          <div class="loc-name">สวน / ทางเดิน</div>
          <div class="loc-form">Gardener Checklist</div>
        </button>
        <button type="button" class="location-btn" data-loc="ปั้มลม" data-type="gardener" onclick="selectLoc(this)">
          <span class="loc-icon">💨</span>
          <div class="loc-name">ปั้มลม</div>
          <div class="loc-form">Gardener Checklist</div>
        </button>
        <button type="button" class="location-btn" data-loc="ทางเข้า-ออกสถานี" data-type="gardener" onclick="selectLoc(this)">
          <span class="loc-icon">🏪</span>
          <div class="loc-name">ทางเข้า-ออก</div>
          <div class="loc-form">Gardener Checklist</div>
        </button>
      </div>
    </div>

    <!-- เวลาเช็คอิน -->
    <div class="field">
      <label>🕐 เวลาเช็คอิน / Check-in Time</label>
      <div class="time-row">
        <div class="field"><input type="time" id="sel-time"></div>
        <button class="now-btn" onclick="setNow()">ตอนนี้</button>
      </div>
    </div>

    <hr class="divider">

    <button class="login-btn" id="enter-btn" onclick="proceed()" disabled>
      เข้าสู่แบบฟอร์มการทำงาน →
    </button>
    <div class="error-msg" id="err-msg">กรุณากรอกข้อมูลให้ครบทุกช่อง</div>
  </div>

  <p class="footer-note">บริษัท เอวิน โฮลดิ้ง จำกัด &nbsp;·&nbsp; เวลาทำการ 07:00–16:00 น.</p>
</div>

<script>
  var selectedLoc = null;
  var selectedType = null;

  function setNow() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('sel-time').value = h + ':' + m;
    checkReady();
  }

  function selectLoc(btn) {
    document.querySelectorAll('.location-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedLoc = btn.dataset.loc;
    selectedType = btn.dataset.type;
    checkReady();
  }

  function checkReady() {
    var name = document.getElementById('sel-name').value;
    var time = document.getElementById('sel-time').value;
    var ok = name && selectedLoc && time;
    document.getElementById('enter-btn').disabled = !ok;
  }

  document.getElementById('sel-name').addEventListener('change', checkReady);
  document.getElementById('sel-time').addEventListener('change', checkReady);

  function proceed() {
    var name = document.getElementById('sel-name').value;
    var time = document.getElementById('sel-time').value;
    if (!name || !selectedLoc || !time) {
      document.getElementById('err-msg').style.display = 'block';
      return;
    }
    var empName = name.split('|')[0];
    var formType = selectedType;
    var params = '?name=' + encodeURIComponent(empName)
               + '&loc=' + encodeURIComponent(selectedLoc)
               + '&time=' + encodeURIComponent(time)
               + '&type=' + encodeURIComponent(formType);
    var target = formType === 'cleaning'
      ? 'CLEANING_CHECKLIST_WOMAN_Form.html' + params
      : 'GARDENING_CHECKLIST_Form.html' + params;
    window.location.href = target;
  }

  // auto set time on load
  setNow();
</script>
</body>
</html>
